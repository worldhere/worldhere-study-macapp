name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flask requests openpyxl pillow pyinstaller

      - name: Verify imports
        run: |
          python -c "import flask; import requests; import openpyxl; import PIL; print('All imports OK')"

      - name: Build .app
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== PyInstaller version ==="
          python -m PyInstaller --version
          echo "=== Checking files ==="
          ls -la run_app.py app.py db.py
          ls -la templates/
          ls -la static/
          echo "=== Running PyInstaller ==="
          python -m PyInstaller \
            --name=RunningMan \
            --console \
            --add-data="templates:templates" \
            --add-data="static:static" \
            --hidden-import=flask.json \
            --hidden-import=jinja2.ext \
            run_app.py 2>&1 | tee build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== Build exit code: $BUILD_EXIT ==="
          echo "=== Build complete ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not created"
          find dist/ -type f -o -type d 2>/dev/null || echo "no files in dist/"
          echo "=== Full dist structure ==="
          find dist/ -name "*" 2>/dev/null || echo "find failed"

      - name: Verify build
        run: |
          ls -la dist/
          ls -la dist/RunningMan.app/Contents/MacOS/

      - name: Package as DMG
        run: |
          hdiutil create -volname "RunningMan" -srcfolder dist/RunningMan.app -ov -format UDZO dist/RunningMan.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunningMan-macos
          path: |
            dist/RunningMan.app
            dist/RunningMan.dmg
          retention-days: 30
