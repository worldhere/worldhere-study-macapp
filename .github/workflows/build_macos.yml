name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flask requests openpyxl pillow pyinstaller

      - name: Verify imports
        run: |
          python -c "import flask; import requests; import openpyxl; import PIL; print('All imports OK')"

      - name: Build .app using spec file
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== PyInstaller version ==="
          python -m PyInstaller --version
          echo "=== Checking spec file ==="
          ls -la running_man_macos.spec
          echo "=== Running PyInstaller with spec file ==="
          python -m PyInstaller running_man_macos.spec --noconfirm 2>&1 | tee build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== Build exit code: $BUILD_EXIT ==="
          echo "=== Build complete ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not created"
          echo "=== Full dist structure ==="
          find dist/ 2>/dev/null || echo "find failed"

      - name: Verify build
        run: |
          echo "=== Checking dist directory ==="
          ls -la dist/ 2>/dev/null || echo "dist not found"
          echo "=== Looking for .app bundle ==="
          find dist/ -name "*.app" -type d 2>/dev/null || echo "No .app found"
          echo "=== Checking RunningMan directory ==="
          ls -la dist/RunningMan/ 2>/dev/null || echo "RunningMan dir not found"
          echo "=== Checking if .app exists ==="
          test -d "dist/RunningMan.app" && echo ".app EXISTS" || echo ".app NOT FOUND"

      - name: Package as DMG
        run: |
          hdiutil create -volname "RunningMan" -srcfolder dist/RunningMan.app -ov -format UDZO dist/RunningMan.dmg

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 7

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RunningMan-macos
          path: |
            dist/RunningMan.app
            dist/RunningMan.dmg
          retention-days: 30
