name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flask requests openpyxl pillow pyinstaller

      - name: Verify imports
        run: |
          python -c "import flask; import requests; import openpyxl; import PIL; print('All imports OK')"

      - name: Build .app
        run: |
          set -x
          ls -la
          ls -la templates/
          ls -la static/
          python -m PyInstaller \
            --name=RunningMan \
            --console \
            --add-data="templates:templates" \
            --add-data="static:static" \
            --hidden-import=flask.json \
            --hidden-import=jinja2.ext \
            run_app.py 2>&1 || true
          echo "Build exit code: $?"

      - name: Verify build
        run: |
          ls -la dist/
          ls -la dist/RunningMan.app/Contents/MacOS/

      - name: Package as DMG
        run: |
          hdiutil create -volname "RunningMan" -srcfolder dist/RunningMan.app -ov -format UDZO dist/RunningMan.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunningMan-macos
          path: |
            dist/RunningMan.app
            dist/RunningMan.dmg
          retention-days: 30
