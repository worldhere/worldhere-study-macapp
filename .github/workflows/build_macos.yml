name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Test imports
        run: |
          python -c "import app; print('app imported successfully')"

      - name: Build .app
        run: |
          python -m PyInstaller running_man_macos.spec --noconfirm --clean

      - name: Package as DMG
        run: |
          hdiutil create -volname "RunningMan" -srcfolder dist/RunningMan.app -ov -format UDZO dist/RunningMan.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunningMan-macos
          path: |
            dist/RunningMan.app
            dist/RunningMan.dmg
          retention-days: 30
